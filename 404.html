<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <script>
      // Single Page Apps for GitHub Pages (https://github.com/rafgraph/spa-github-pages)
      //
      // The Slidev decks under slides/<name>/ are client-side-routed SPAs (Vue Router,
      // history mode: paths like /reports/slides/apte/1). GitHub Pages has no server-side
      // rewrite, so a direct link or a page refresh on any slide other than the first hits
      // this 404 page. If the path falls under slides/<name>/, redirect into that deck's
      // index.html with the intended path preserved in a query string; the deck's index.html
      // has a matching decoder snippet that restores it via history.replaceState before the
      // router boots. Anything outside slides/ (thesis notes, meetings, etc.) falls through
      // to this plain page — those are real 404s, not SPA routes.
      var l = window.location;
      var m = l.pathname.match(/^(\/reports\/slides\/[^/]+\/)(.*)$/);
      if (m) {
        var base = m[1];
        var rest = m[2];
        var query = l.search.replace(/^\?/, "~and~");
        l.replace(
          base + "?p=/" + rest.replace(/&/g, "~and~") + query + l.hash
        );
      }
    </script>
  </head>
  <body>
  </body>
</html>
